version: "3.9"
services:
  bookowners-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: bookowners-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BupaApi__BaseUrl=https://digitalcodingtest.bupa.com.au/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s