name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - run: dotnet test tests/BookOwners.UnitTests --no-build -c Release --logger "trx;LogFileName=unit-results.trx" --collect:"XPlat Code Coverage"
      - run: dotnet test tests/BookOwners.IntegrationTests --no-build -c Release --logger "trx;LogFileName=integration-results.trx"
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: NUnit Test Results
          path: "**/*.trx"
          reporter: dotnet-trx
      - run: docker build --target runtime -t bookowners-api:${{ github.sha }} .